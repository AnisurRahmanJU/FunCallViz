<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Function Call Visualizer</title>
  <link href="styles.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h2>Function Call Visualizer</h2>
    <select id="functionSelect" onchange="loadFunction()">
      <option value="normal">Normal Function</option>
      <option value="factorial">Factorial</option>
      <option value="fibonacci">Fibonacci</option>
      <option value="gcd">GCD</option>
    </select>
    <pre><code class="language-c" id="codeArea"></code></pre>
    <button onclick="nextStep()">Next Step</button>
    <div id="graph"></div>
    <div id="outputArea"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
